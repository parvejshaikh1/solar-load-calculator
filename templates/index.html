<!DOCTYPE html>
<html>

<head>

    <title>Solar Load Calculator</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            text-align:center;
            padding-top:100px;
        }

        .container{
            background:#1e293b;
            width:40%;
            margin:auto;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 0px 15px rgba(255,255,255,0.1);
        }

        h1{
            color:#38bdf8;
            margin-bottom:30px;
        }

        input{
            padding:10px;
            width:80%;
            border-radius:8px;
            border:none;
            margin-bottom:20px;
        }

        button{
            background:#38bdf8;
            color:white;
            padding:12px 25px;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0ea5e9;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Upload Electricity Bill</h1>

        <form method="POST" enctype="multipart/form-data">

            <input type="file" name="bill" required>

            <br><br>

            <button type="submit">
                Generate Excel
            </button>

        </form>

    </div>

</body>

</html>
